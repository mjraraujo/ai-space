server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # ── Cross-origin isolation (required for WebGPU / SharedArrayBuffer) ─────
    # "credentialless" keeps full isolation while permitting public CDN
    # resources (HuggingFace model weights, jsDelivr) that lack a
    # Cross-Origin-Resource-Policy header.
    #
    # NOTE: Every location block that uses its own add_header MUST repeat
    # these directives — nginx does NOT inherit server-level add_header
    # into locations that define their own.

    # Baseline security headers — inherited only by locations that do NOT
    # declare their own add_header (i.e. the proxy locations below).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── API reverse proxy → ai-server ─────────────────────────────────────────
    location /api/ {
        proxy_pass         http://ai-server:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE / long-polling support
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     600s;
        proxy_connect_timeout  10s;
        proxy_send_timeout     600s;

        # Allow large audio uploads (50 MB)
        client_max_body_size 50m;
    }

    # ── WebSocket proxy → PersonaPlex voice ──────────────────────────────────
    # Trailing slash on proxy_pass is required: it tells nginx to strip the
    # /ws/voice/ prefix before forwarding, so the browser's request for
    # /ws/voice/api/chat reaches PersonaPlex as /api/chat.
    #
    # The 'personaplex' hostname resolves in two ways depending on how the
    # stack was started:
    #   • With --profile personaplex       → the in-container service
    #   • Without the profile              → the Docker host, via the
    #                                        'personaplex:host-gateway' entry
    #                                        declared on the nginx service
    # If neither is present, nginx returns 502 and the browser stays on its
    # browser-native voice fallback — this is the intended behaviour.
    location /ws/voice/ {
        proxy_pass          http://personaplex:8998/;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_set_header    X-Real-IP  $remote_addr;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_connect_timeout 10s;
    }

    # ── Health check ─────────────────────────────────────────────────────────
    location /health {
        proxy_pass http://ai-server:3000/health;
        proxy_http_version 1.1;
    }

    # ── Static asset caching ─────────────────────────────────────────────────
    location ~* \.(wasm|bin|onnx)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "credentialless" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location ~* \.(js|css|svg|png|ico)$ {
        expires 7d;
        add_header Cache-Control "public";
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "credentialless" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── SPA fallback ─────────────────────────────────────────────────────────
    # Explicit headers here — do not rely on server-level inheritance which
    # is fragile when other location blocks define their own add_header.
    location / {
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "credentialless" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        try_files $uri $uri/ /index.html;
    }

    # ── Compression ───────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/css application/javascript application/json application/wasm;
    gzip_min_length 256;
}
