server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # COOP for security (COEP removed — it blocks CDN imports like web-llm from esm.run)
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    # Cache model weights aggressively
    location ~* \.(wasm|bin|onnx)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache static assets
    location ~* \.(js|css|svg|png|ico)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript application/json application/wasm;
    gzip_min_length 256;
}
