server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── API reverse proxy → ai-server ─────────────────────────────────────────
    location /api/ {
        proxy_pass         http://ai-server:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE / long-polling support
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     600s;
        proxy_connect_timeout  10s;
        proxy_send_timeout     600s;

        # Allow large audio uploads (50 MB)
        client_max_body_size 50m;
    }

    # ── WebSocket proxy → PersonaPlex voice ──────────────────────────────────
    # Trailing slash on proxy_pass is required: it tells nginx to strip the
    # /ws/voice/ prefix before forwarding, so the browser's request for
    # /ws/voice/api/chat reaches PersonaPlex as /api/chat.
    location /ws/voice/ {
        proxy_pass          http://personaplex:8998/;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_set_header    X-Real-IP  $remote_addr;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_connect_timeout 10s;
    }

    # ── Health check ─────────────────────────────────────────────────────────
    location /health {
        proxy_pass http://ai-server:3000/health;
        proxy_http_version 1.1;
    }

    # ── Static asset caching ─────────────────────────────────────────────────
    location ~* \.(wasm|bin|onnx)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Cross-Origin-Opener-Policy "same-origin" always;
    }

    location ~* \.(js|css|svg|png|ico)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── SPA fallback ─────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Compression ───────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/css application/javascript application/json application/wasm;
    gzip_min_length 256;
}
