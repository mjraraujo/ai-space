# docker-compose.base.yml — Full AI Space stack (CPU-only).
#
# Includes:
#   nginx        — SPA + reverse proxy (port 8080)
#   ai-server    — Node.js API server (models, chat, KV, voice)
#   ollama       — Local LLM inference server
#   faster-whisper — Speech-to-text (CPU mode)
#   kokoro        — Text-to-speech (CPU mode, Kokoro-TTS)
#
# Usage:
#   docker compose -f docker-compose.base.yml up
#
# For GPU acceleration overlay:
#   docker compose -f docker-compose.base.yml -f docker-compose.gpu.yml up

services:

  # ── SPA + reverse proxy ─────────────────────────────────────────────────────
  nginx:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/mjraraujo/ai-space:latest
    ports:
      - "8080:8080"
    environment:
      # Exposed to the browser — must be a URL the *browser* can reach.
      # On a local machine this is typically http://localhost:8080.
      SERVER_URL: "${SERVER_URL:-http://localhost:8080}"
    depends_on:
      ai-server:
        condition: service_healthy
    extra_hosts:
      - "personaplex:host-gateway"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── AI Space API server ─────────────────────────────────────────────────────
  ai-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: ghcr.io/mjraraujo/ai-space-server:latest
    environment:
      NODE_ENV:      production
      PORT:          "3000"
      OLLAMA_HOST:   "http://ollama:11434"
      WHISPER_HOST:  "http://faster-whisper:9000"
      KOKORO_HOST:   "http://kokoro:8880"
      KV_CACHE_DIR:  /data/kv-cache
      KV_MAX_SLOTS:  "64"
    volumes:
      - kv-cache:/data/kv-cache
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Ollama — local LLM inference ────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── faster-whisper — server-side speech-to-text (CPU) ───────────────────────
  faster-whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    environment:
      WHISPER__MODEL: large-v3-turbo
    volumes:
      - model-store:/root/.cache/huggingface
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Kokoro-TTS — server-side text-to-speech (CPU) ───────────────────────────
  kokoro:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8880/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  ollama-data:
    driver: local
  model-store:
    driver: local
  kv-cache:
    driver: local
