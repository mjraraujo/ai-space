# docker-compose.yml — Simple CPU quickstart (single-machine, no GPU required).
#
# For the full stack with faster-whisper, Kokoro-TTS, and dedicated volumes use:
#   docker compose -f docker-compose.base.yml up
#
# For the full stack WITH GPU acceleration use:
#   docker compose -f docker-compose.base.yml -f docker-compose.gpu.yml up

services:

  nginx:
    build: .
    ports:
      - "8080:8080"
    environment:
      SERVER_URL: "http://localhost:8080"
      # Routes PersonaPlex WebSocket connections through the nginx proxy.
      # PersonaPlex must be running on the Docker host (see README for setup).
      PERSONAPLEX_URL: "${PERSONAPLEX_URL:-/ws/voice}"
    depends_on:
      - ai-server
    extra_hosts:
      - "personaplex:host-gateway"
    restart: unless-stopped

  ai-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      OLLAMA_HOST: "http://ollama:11434"
      WHISPER_HOST: "http://faster-whisper:9000"
      KOKORO_HOST: "http://kokoro:8880"
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

  faster-whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    environment:
      WHISPER__MODEL: large-v3-turbo
    restart: unless-stopped

  kokoro:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
    restart: unless-stopped

volumes:
  ollama-data:

